apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: coupler-gateway-secrets
  namespace: coupler
  labels:
    app.kubernetes.io/managed-by: enclii
    app.kubernetes.io/part-of: coupler
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-store
    kind: ClusterSecretStore
  target:
    name: coupler-gateway-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: janua-service-token
      remoteRef:
        key: secret/coupler
        property: janua_service_token
