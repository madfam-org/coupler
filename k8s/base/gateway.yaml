apiVersion: v1
kind: Namespace
metadata:
  name: coupler
  labels:
    app.kubernetes.io/part-of: madfam-platform
    platform.madfam.io/name: coupler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coupler-gateway
  namespace: coupler
  labels:
    app: coupler-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coupler-gateway
  template:
    metadata:
      labels:
        app: coupler-gateway
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop:
                - ALL
          image: ghcr.io/madfam-org/coupler-gateway:latest
          ports:
            - containerPort: 8787
              name: http
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: PORT
              value: "8787"
            - name: COUPLER_CONNECTORS_DIR
              value: /connectors
            - name: COUPLER_JANUA_ISSUER
              value: https://auth.madfam.io
            - name: COUPLER_JANUA_AUDIENCE
              value: coupler-api
            - name: COUPLER_AUTH_REQUIRED
              value: "true"
            - name: COUPLER_JANUA_API_URL
              value: https://auth.madfam.io
            - name: COUPLER_JANUA_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: coupler-gateway-secrets
                  key: janua-service-token
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: coupler-gateway
  namespace: coupler
spec:
  selector:
    app: coupler-gateway
  ports:
    - port: 8787
      targetPort: http
      name: http
