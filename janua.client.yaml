# Janua OIDC client bootstrap — register via janua admin or terraform
# Phase 1: enable ConnectedAccount scopes for coupler.github.* and coupler.slack.*
client_id: coupler-gateway
client_name: Coupler Gateway
client_type: confidential
grant_types:
  - client_credentials
  - authorization_code
redirect_uris:
  - https://api.coupler.madfam.io/oauth/callback
post_logout_redirect_uris:
  - https://coupler.madfam.io
audiences:
  - coupler-api
scopes:
  - openid
  - profile
  - email
  - coupler:tools:execute
  - coupler:connections:read
token_endpoint_auth_method: client_secret_post
jwks_uri: https://auth.madfam.io/.well-known/jwks.json
issuer: https://auth.madfam.io
notes: |
  Service-to-service: gateway uses client_credentials for internal ops.
  User delegated execute: requires Janua ConnectedAccount delegation API (P1).
