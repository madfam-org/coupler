name: Staging — build & deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/gateway/**"
      - "apps/landing/**"
      - "connectors/**"
      - "k8s/**"
      - "scripts/**"
      - ".github/workflows/staging-deploy.yml"
      - "!k8s/overlays/staging/kustomization.yaml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual staging deploy"
        required: true
        type: string

concurrency:
  group: coupler-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build-gateway:
    name: Build gateway
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/gateway/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/madfam-org/coupler-gateway:staging-${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,scope=gateway,mode=max

  build-landing:
    name: Build landing
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/landing/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/madfam-org/coupler-landing:staging-${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=landing
          cache-to: type=gha,scope=landing,mode=max

  update-staging:
    name: Patch staging overlay digests
    needs: [build-gateway, build-landing]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch digests
        run: |
          SHORT="$(git rev-parse --short HEAD)"
          FILE="k8s/overlays/staging/kustomization.yaml"
          python3 scripts/patch-kustomize-digest.py "$FILE" ghcr.io/madfam-org/coupler-gateway "${{ needs.build-gateway.outputs.digest }}"
          python3 scripts/patch-kustomize-digest.py "$FILE" ghcr.io/madfam-org/coupler-landing "${{ needs.build-landing.outputs.digest }}"
          git config user.name "coupler-bot"
          git config user.email "bot@madfam.io"
          git add "$FILE"
          git commit -m "deploy(staging): gateway+landing $SHORT"
          git pull --rebase origin main
          git push
